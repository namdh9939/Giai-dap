<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Trợ lý tư vấn xây nhà dành cho học viên khóa học Xây Nhà Lần Đầu. Giải đáp 5 vấn đề quan trọng: Hợp đồng, Pháp lý, Báo giá, Tiêu chuẩn thi công, Thắc mắc.">
  <title>Trợ Lý Xây Nhà | Khóa Học Xây Nhà Lần Đầu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ====== REGISTRATION GATE ====== -->
  <div id="register-screen" class="register-screen">
    <div class="register-card">
      <div class="register-header">
        <div class="register-logo">🏠</div>
        <h1 class="register-title">Trợ Lý Xây Nhà</h1>
        <p class="register-desc">Vui lòng điền đầy đủ thông tin bên dưới để sử dụng công cụ tư vấn dành riêng cho học viên.</p>
      </div>

      <form id="register-form" class="register-form" novalidate>
        <!-- Họ và tên -->
        <div class="form-group">
          <label for="input-name" class="form-label">Họ và tên</label>
          <input type="text" id="input-name" class="form-input" placeholder="VD: Nguyễn Văn A" required autocomplete="name">
          <span class="form-error" id="error-name"></span>
        </div>

        <!-- Số điện thoại -->
        <div class="form-group">
          <label for="input-phone" class="form-label">Số điện thoại</label>
          <input type="tel" id="input-phone" class="form-input" placeholder="VD: 0901 234 567" required autocomplete="tel">
          <span class="form-error" id="error-phone"></span>
        </div>

        <!-- Thành viên khóa học -->
        <div class="form-group">
          <label for="input-course" class="form-label">Thành viên khóa học</label>
          <select id="input-course" class="form-input form-select" required>
            <option value="" disabled selected>— Chọn khóa học —</option>
            <option value="tu-kiem-soat">Tự Kiểm Soát Xây Nhà</option>
            <option value="xay-nha-lan-dau">Xây Nhà Lần Đầu</option>
          </select>
          <span class="form-error" id="error-course"></span>
        </div>

        <!-- Lớp học (chỉ hiện khi chọn Tự Kiểm Soát) -->
        <div class="form-group form-group-class hidden" id="class-group">
          <label for="input-class" class="form-label">Lớp học đã tham gia</label>
          <input type="text" id="input-class" class="form-input" placeholder="VD: K15">
          <span class="form-error" id="error-class"></span>
        </div>

        <!-- Submit -->
        <button type="submit" id="btn-submit" class="form-submit">
          Bắt đầu sử dụng
        </button>
      </form>
    </div>
  </div>

  <!-- ====== CHAT APP (ẩn cho đến khi đăng ký) ====== -->
  <div id="app" class="app-container hidden">

    <!-- ====== SIDEBAR — Desktop only ====== -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🏠</div>
        <h2 class="sidebar-title">Trợ Lý Xây Nhà</h2>
        <p class="sidebar-subtitle">Công cụ tư vấn dành cho học viên</p>
      </div>
      <nav class="sidebar-nav">
        <p class="sidebar-nav-label">Chủ đề tư vấn</p>
        <div id="sidebar-topics" class="sidebar-topics">
          <!-- Topic buttons rendered by JS -->
        </div>
      </nav>
      <div class="sidebar-apikey">
        <button id="btn-apikey" class="btn-apikey" title="Cài đặt API Key">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
          <span>API Key</span>
        </button>
      </div>
    </aside>

    <!-- API Key Modal -->
    <div id="apikey-modal" class="apikey-modal hidden">
      <div class="apikey-card">
        <h3 class="apikey-title">Cài đặt API Key</h3>
        <p class="apikey-desc">Nhập <strong>Groq</strong> (gsk_...) hoặc <strong>Gemini</strong> (AIza...) API Key.</p>
        <input type="password" id="apikey-input" class="apikey-input" placeholder="gsk_... hoặc AIza...">
        <div class="apikey-status" id="apikey-status"></div>
        <div class="apikey-actions">
          <button id="apikey-save" class="apikey-btn apikey-btn-save">Lưu & Kích hoạt</button>
          <button id="apikey-close" class="apikey-btn apikey-btn-close">Đóng</button>
        </div>
      </div>
    </div>

    <!-- ====== CHAT PANEL ====== -->
    <div class="chat-panel">

      <!-- Chat Messages Area -->
      <main id="chat-messages" class="chat-messages" role="log" aria-live="polite" aria-label="Khu vực tin nhắn">
        <!-- Messages will be injected here by JS -->
      </main>

      <!-- Quick Replies Popup (hidden by default) -->
      <section id="quick-replies" class="quick-replies hidden" aria-label="Lựa chọn nhanh">
        <!-- Quick reply buttons will be injected here by JS -->
      </section>

      <!-- Floating Toggle Buttons -->
      <div class="fab-group">
        <button id="fab-apikey" class="fab-btn fab-apikey" aria-label="Cài đặt API Key" title="Cài đặt API Key">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
        </button>
        <button id="fab-docs" class="fab-btn fab-docs" aria-label="Tài liệu tham khảo" title="Tài liệu tham khảo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </button>
        <button id="fab-suggestions" class="fab-btn fab-suggestions" aria-label="Câu hỏi gợi ý" title="Câu hỏi gợi ý">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </button>
      </div>

      <!-- Docs Popup (hidden by default) -->
      <div id="docs-popup" class="docs-popup hidden">
        <div class="docs-popup-header">Tài liệu tham khảo</div>
        <div id="docs-popup-list" class="docs-popup-list"></div>
      </div>

      <!-- Typing Indicator -->
      <div id="typing-indicator" class="typing-indicator hidden" aria-label="Trợ lý đang soạn tin">
        <div class="typing-avatar">🏠</div>
        <div class="typing-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <!-- Chat Input Bar -->
      <div id="chat-input-bar" class="chat-input-bar">
        <input type="text" id="chat-input" class="chat-input" placeholder="Nhập câu hỏi của bạn..." autocomplete="off">
        <button id="chat-send-btn" class="chat-send-btn" aria-label="Gửi tin nhắn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script src="app.js?v=3.0"></script>
</body>
</html>
