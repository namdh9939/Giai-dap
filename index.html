<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Trợ lý tư vấn xây nhà dành cho học viên khóa học Xây Nhà Lần Đầu.">
  <title>Trợ Lý Xây Nhà | Khóa Học Xây Nhà Lần Đầu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
  <!-- ====== REGISTRATION GATE ====== -->
  <div id="register-screen" class="register-screen">
    <div class="register-card">
      <div class="register-header">
        <div class="register-logo">🏠</div>
        <h1 class="register-title">Trợ Lý Xây Nhà</h1>
        <p class="register-desc">Vui lòng điền đầy đủ thông tin bên dưới để sử dụng công cụ tư vấn dành riêng cho học viên.</p>
      </div>
      <form id="register-form" class="register-form" novalidate>
        <div class="form-group">
          <label for="input-name" class="form-label">Họ và tên</label>
          <input type="text" id="input-name" class="form-input" placeholder="VD: Nguyễn Văn A" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="input-phone" class="form-label">Số điện thoại</label>
          <input type="tel" id="input-phone" class="form-input" placeholder="VD: 0901 234 567" required autocomplete="tel">
        </div>
        <div class="form-group">
          <label for="input-course" class="form-label">Thành viên khóa học</label>
          <select id="input-course" class="form-input form-select" required>
            <option value="" disabled selected>— Chọn khóa học —</option>
            <option value="tu-kiem-soat">Tự Kiểm Soát Xây Nhà</option>
            <option value="xay-nha-lan-dau">Xây Nhà Lần Đầu</option>
          </select>
        </div>
        <div class="form-group form-group-class hidden" id="class-group">
          <label for="input-class" class="form-label">Lớp học đã tham gia</label>
          <input type="text" id="input-class" class="form-input" placeholder="VD: K15">
        </div>
        <button type="submit" id="btn-submit" class="form-submit">Bắt đầu sử dụng</button>
      </form>
    </div>
  </div>

  <!-- ====== CHAT APP ====== -->
  <div id="app" class="app-container hidden">

    <!-- CHANGE 1: Sidebar collapsible -->
    <aside id="sidebar" class="sidebar collapsed">
      <div class="sidebar-toggle-area">
        <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <span class="sidebar-logo-icon">🏠</span>
      </div>
      <div class="sidebar-expanded-content">
        <div class="sidebar-header">
          <h2 class="sidebar-title">Trợ Lý Xây Nhà</h2>
          <p class="sidebar-subtitle">Công cụ tư vấn dành cho học viên</p>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div id="sidebar-topics" class="sidebar-topics"></div>
      </nav>
    </aside>
    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

    <!-- CHAT PANEL -->
    <div class="chat-panel">

      <!-- CHANGE 6: Header breadcrumb + New chat -->
      <header class="chat-header">
        <div class="header-left">
          <button id="mobile-menu-btn" class="mobile-menu-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          <span class="header-breadcrumb">
            <span class="breadcrumb-home">Trợ Lý Xây Nhà</span>
            <span id="breadcrumb-topic" class="breadcrumb-topic"></span>
          </span>
        </div>
        <button id="btn-new-chat" class="btn-new-chat" title="Cuộc trò chuyện mới">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
          <span>Hỏi mới</span>
        </button>
      </header>

      <!-- Chat Messages -->
      <main id="chat-messages" class="chat-messages" role="log" aria-live="polite"></main>

      <!-- CHANGE 2: Chip suggestions above input -->
      <div id="suggestion-chips" class="suggestion-chips"></div>

      <!-- Typing Indicator -->
      <div id="typing-indicator" class="typing-indicator hidden">
        <div class="typing-avatar">🏠</div>
        <div class="typing-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      </div>

      <!-- File Preview -->
      <div id="file-preview" class="file-preview hidden">
        <div class="file-preview-info">
          <span id="file-preview-icon" class="file-preview-icon"></span>
          <span id="file-preview-name" class="file-preview-name"></span>
        </div>
        <button id="file-preview-remove" class="file-preview-remove">&times;</button>
      </div>

      <!-- CHANGE 5: Improved input -->
      <div id="chat-input-bar" class="chat-input-bar">
        <input type="file" id="file-upload" accept="image/*,.pdf,.xlsx,.xls,.docx,.doc" hidden>
        <button id="btn-attach" class="btn-attach" title="Đính kèm hình ảnh hoặc tài liệu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </button>
        <input type="text" id="chat-input" class="chat-input" placeholder="Hỏi về hợp đồng, báo giá, tiêu chuẩn thi công..." autocomplete="off">
        <button id="chat-send-btn" class="chat-send-btn disabled" aria-label="Gửi tin nhắn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
      <p id="input-hint" class="input-hint">Nhấn Enter để gửi</p>
    </div>
  </div>

  <script src="app.js?v=4.0"></script>
</body>
</html>
